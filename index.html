<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Premium Birthday Website</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- External CSS File -->
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div class="balloon balloon1"></div>
<div class="balloon balloon2"></div>
<div class="balloon balloon3"></div>
<div class="balloon balloon4"></div>

    <!-- Hero Section Starts -->

 <section class="hero">

        <!-- Main Heading -->

        <h1>
            Happy Birthday 🎂
        </h1>
        <p id="typing"></p>

        <!-- Custom Birthday Message -->

        <p>
            Wishing you happiness, success and countless beautiful memories.
        </p>

        <!-- Surprise Button -->

<button onclick="showSurprise()">
    Open Surprise 🎁
</button>

<!-- Surprise Section -->

   <div id="surprise" class="surprise">

    <h2>🎉 Surprise! 🎉</h2>

    <p>
        Wishing you a birthday filled with happiness, success and beautiful memories.
    </p>

    <button id="nextBtn" onclick="showGallery()">
        View Memories ❤️
    </button>

</div>   <!-- YAHAN surprise div close karo -->


<div id="gallery" class="gallery">

    <img id="slider" src="images/photo1.jpeg" alt="Memory">

    <div class="controls">
        <button onclick="prevPhoto()">⬅ Prev</button>
        <button onclick="nextPhoto()">Next ➡</button>
    </div>

</div>
    <!-- Hero Section Ends -->

    <!-- External JavaScript File -->
</section> 
   <audio id="music" loop>
    <source src="music/birthday.mp3" type="audio/mpeg">
</audio>
    <script src="https://unpkg.com/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
    

</body>

</html>
